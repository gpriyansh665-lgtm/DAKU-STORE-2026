<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU ADMIN | VIP PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        :root { --primary: #ff4b2b; --bg: #05070a; --card: #0f121d; --accent: #00ffcc; }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

        /* 🔒 LOGIN SCREEN */
        #admin-auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; width: 90%; max-width: 350px; box-shadow: 0 0 20px rgba(255, 75, 43, 0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #161a26; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        /* 📊 DASHBOARD */
        #admin-dashboard { display: none; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; border-left: 5px solid var(--primary); position: relative; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 5px; font-size: 10px; font-weight: bold; font-family: 'Orbitron'; }
        .pending { background: #ffcc00; color: #000; }
        .success { background: #00ffcc; color: #000; }
        
        .order-info p { margin: 8px 0; font-size: 13px; color: #ccc; }
        .order-info b { color: var(--accent); }
        
        .proof-btn { display: inline-block; margin-top: 10px; background: rgba(0, 255, 204, 0.1); color: var(--accent); padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; border: 1px solid var(--accent); transition: 0.3s; }
        .proof-btn:hover { background: var(--accent); color: #000; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .act-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; transition: 0.2s; }
        .btn-done { background: #00ffcc; color: #000; }
        .btn-delete { background: #ff4b2b; color: white; }
    </style>
</head>
<body>

    <div id="admin-auth">
        <div class="auth-box">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom: 20px;">DAKU ADMIN</h2>
            <input type="email" id="admEmail" placeholder="teamcobra665@gmail.com">
            <input type="password" id="admPass" placeholder="dakuyt1m">
            <button class="btn-login" onclick="loginAdmin()">ENTER PANEL</button>
        </div>
    </div>

    <div id="admin-dashboard">
        <div class="header">
            <h2 style="font-family:'Orbitron'; font-size: 18px; color: var(--primary);">LIVE ORDERS</h2>
            <button onclick="logoutAdmin()" style="background:red; border: none; color:white; padding:5px 12px; border-radius:5px; cursor:pointer; font-size: 10px;">LOGOUT</button>
        </div>

        <div id="orders-container">
            <p style="text-align:center; color:#444;">Bhai, orders aa rahe hain...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // 🛠️ FIREBASE CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", 
            authDomain: "daku-store-f2f40.firebaseapp.com", 
            projectId: "daku-store-f2f40", 
            storageBucket: "daku-store-f2f40.firebasestorage.app", 
            messagingSenderId: "556695942867", 
            appId: "1:556695942867:web:e7ca38cd63e788cee80626" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🛡️ ADMIN DETAILS
        const ADMIN_USER = "teamcobra665@gmail.com";
        const ADMIN_PASS = "dakuyt1m";

        function loginAdmin() {
            const e = document.getElementById('admEmail').value;
            const p = document.getElementById('admPass').value;
            if(e === ADMIN_USER && p === ADMIN_PASS) {
                localStorage.setItem("isDakuAdmin", "true");
                showDashboard();
            } else {
                alert("DHOKHA DIYA LAUDE 🔥!");
            }
        }

        function showDashboard() {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            fetchOrders();
        }

        function logoutAdmin() {
            localStorage.removeItem("isDakuAdmin");
            location.reload();
        }

        if(localStorage.getItem("isDakuAdmin") === "true") {
            showDashboard();
        }

        function fetchOrders() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('orders-container');
                container.innerHTML = "";
                
                snapshot.forEach(doc => {
                    const order = doc.data();
                    const orderId = doc.id;
                    const statusClass = order.status === "Pending" ? "pending" : "success";

                    container.innerHTML += `
                        <div class="order-card">
                            <span class="status-badge ${statusClass}">${order.status}</span>
                            <div class="order-info">
                                <p><b>User:</b> ${order.email}</p>
                                <p><b>Plan:</b> ${order.plan}</p>
                                <p><b>UID:</b> ${order.uid}</p>
                                <p><b>Server:</b> ${order.server}</p>
                                
                                <a href="${order.screenshot}" target="_blank" class="proof-btn">
                                    <i class="fas fa-eye"></i> VIEW PAYMENT PROOF
                                </a>
                            </div>
                            
                            <div class="action-btns">
                                <button class="act-btn btn-done" onclick="markDone('${orderId}')">MARK SUCCESS</button>
                                <button class="act-btn btn-delete" onclick="deleteOrder('${orderId}')">DELETE</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function markDone(id) {
            db.collection("orders").doc(id).update({ status: "Success" });
        }

        function deleteOrder(id) {
            if(confirm("Bhai, delete karna hai?")) {
                db.collection("orders").doc(id).delete();
            }
        }
    </script>
</body>
</html>
