<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU ADMIN | VIP PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #ff4b2b; --bg: #05070a; --card: #0f121d; --accent: #00ffcc; --gold: #ffd700; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

        #admin-auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #161a26; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        #admin-dashboard { display: none; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        
        .maintenance-box { background: #161a26; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; margin-bottom: 25px; }
        .maintenance-box h3 { color: var(--gold); font-family: 'Orbitron'; margin-top: 0; font-size: 16px; }

        .nav-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 20px; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 10px 20px; background: #1a1e2e; border: 1px solid #333; border-radius: 10px; color: #888; white-space: nowrap; font-size: 11px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 10px rgba(255, 75, 43, 0.3); }

        .order-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; border-left: 5px solid var(--primary); position: relative; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .pending { background: #ffcc00; color: #000; }
        .success { background: #00ffcc; color: #000; }

        .order-info p { margin: 5px 0; font-size: 13px; color: #ccc; }
        .order-info b { color: white; }

        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .act-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; transition: 0.2s; }
        .btn-done { background: #00ffcc; color: #000; }
        .btn-done:hover { background: #00e6b8; transform: scale(1.02); }
        .btn-delete { background: #ff4b2b; color: white; }
        .btn-delete:hover { background: #ff3510; transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="admin-auth">
        <div class="auth-box">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin: 0 0 20px 0;">DAKU ADMIN</h2>
            <input type="email" id="admEmail" placeholder="teamcobra665@gmail.com">
            <input type="password" id="admPass" placeholder="dakuyt1m">
            <button class="btn-login" onclick="loginAdmin()">ENTER PANEL</button>
        </div>
    </div>

    <div id="admin-dashboard">
        <div class="header">
            <h2 style="font-family:'Orbitron'; font-size: 18px; color: var(--primary); margin: 0;">DAKU VIP DASHBOARD</h2>
            <button onclick="logoutAdmin()" style="background:#ff4b2b; border: none; color:white; padding:8px 15px; border-radius:8px; font-size: 11px; font-weight: bold; cursor:pointer;">LOGOUT</button>
        </div>

        <div class="maintenance-box">
            <h3><i class="fas fa-tools"></i> MAINTENANCE CONTROL</h3>
            <p id="m-status" style="margin: 15px 0; font-weight: bold; font-size: 14px; letter-spacing: 1px;">Checking...</p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button onclick="setMaintenance(true)" style="background:#ff4b2b; color:white; border-radius:10px; border:none; padding:12px 20px; font-family:'Orbitron'; cursor:pointer; font-size: 12px;">GO OFFLINE</button>
                <button onclick="setMaintenance(false)" style="background:var(--accent); color:black; border-radius:10px; border:none; padding:12px 20px; font-family:'Orbitron'; cursor:pointer; font-size: 12px;">GO ONLINE</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="filterOrders('all', this)">ALL ORDERS</button>
            <button class="tab-btn" onclick="filterOrders('LIKES', this)">LIKES</button>
            <button class="tab-btn" onclick="filterOrders('GLORY', this)">GLORY</button>
            <button class="tab-btn" onclick="filterOrders('WAR', this)">WAR</button>
            <button class="tab-btn" onclick="filterOrders('DIAMONDS', this)">DIAMONDS</button>
        </div>

        <div id="orders-container">
            <p style="text-align:center; color:#555;">Loading orders...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", authDomain: "daku-store-f2f40.firebaseapp.com", projectId: "daku-store-f2f40", storageBucket: "daku-store-f2f40.firebasestorage.app", messagingSenderId: "556695942867", appId: "1:556695942867:web:e7ca38cd63e788cee80626" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_USER = "teamcobra665@gmail.com";
        const ADMIN_PASS = "dakuyt1m";
        let currentFilter = 'all';

        function loginAdmin() {
            const e = document.getElementById('admEmail').value;
            const p = document.getElementById('admPass').value;
            if(e === ADMIN_USER && p === ADMIN_PASS) {
                localStorage.setItem("isDakuAdmin", "true");
                showDashboard();
            } else { alert("Galat Email ya Password!"); }
        }

        function showDashboard() {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            listenOrders();
            listenMaintenance();
        }

        function logoutAdmin() { localStorage.removeItem("isDakuAdmin"); location.reload(); }
        if(localStorage.getItem("isDakuAdmin") === "true") showDashboard();

        function listenMaintenance() {
            db.collection("settings").doc("config").onSnapshot((doc) => {
                const s = document.getElementById('m-status');
                if (doc.exists && doc.data().maintenance === true) { 
                    s.innerText = "🔴 STORE IS OFFLINE"; s.style.color = "#ff4b2b"; 
                } else { 
                    s.innerText = "🟢 STORE IS ONLINE"; s.style.color = "#00ffcc"; 
                }
            });
        }

        async function setMaintenance(val) {
            await db.collection("settings").doc("config").set({ maintenance: val }, { merge: true });
        }

        function filterOrders(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            listenOrders();
        }

        function listenOrders() {
            let query = db.collection("orders").orderBy("timestamp", "desc");
            
            query.onSnapshot(snap => {
                const container = document.getElementById('orders-container');
                container.innerHTML = "";
                
                let count = 0;
                snap.forEach(doc => {
                    const o = doc.data();
                    // Basic keyword filtering
                    if(currentFilter !== 'all') {
                        const plan = o.plan.toUpperCase();
                        if(!plan.includes(currentFilter)) return;
                    }

                    count++;
                    const sClass = o.status === "Pending" ? "pending" : "success";
                    container.innerHTML += `
                        <div class="order-card">
                            <span class="status-badge ${sClass}">${o.status}</span>
                            <div class="order-info">
                                <p><b>User:</b> ${o.email}</p>
                                <p><b>Plan:</b> ${o.plan}</p>
                                <p><b>UID:</b> ${o.uid}</p>
                                <p><b>Server:</b> ${o.server || 'N/A'}</p>
                            </div>
                            <div style="margin-top:10px;">
                                <a href="${o.screenshot}" target="_blank" style="color:var(--accent); font-size:12px; text-decoration:none;">
                                    <i class="fas fa-image"></i> VIEW PAYMENT SCREENSHOT
                                </a>
                            </div>
                            <div class="action-btns">
                                <button class="act-btn btn-done" onclick="markDone('${doc.id}')">MARK SUCCESS</button>
                                <button class="act-btn btn-delete" onclick="deleteOrder('${doc.id}')">DELETE</button>
                            </div>
                        </div>
                    `;
                });
                
                if(count === 0) container.innerHTML = "<p style='text-align:center; color:#555; margin-top:20px;'>No orders found in this category.</p>";
            });
        }

        function markDone(id) { db.collection("orders").doc(id).update({ status: "Success" }); }
        function deleteOrder(id) { if(confirm("Kya aap is order ko hamesha ke liye delete karna chahte hain?")) db.collection("orders").doc(id).delete(); }
    </script>
</body>
</html>
