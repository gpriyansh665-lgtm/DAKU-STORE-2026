<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU STORE | ADMIN PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #ff4b2b; --bg: #05070a; --card: #0f121d; --accent: #00ffcc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

        /* 🔒 ADMIN LOGIN */
        #admin-auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #161a26; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        /* 📊 DASHBOARD */
        #admin-dashboard { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .pending { background: #fc0; color: #000; }
        .success { background: #0f8; color: #000; }
        
        .order-info p { margin: 5px 0; font-size: 13px; color: #bbb; }
        .order-info b { color: var(--accent); }
        .proof-link { display: inline-block; margin-top: 10px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 12px; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .act-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <div id="admin-auth">
        <div class="auth-box">
            <h2 style="font-family:'Orbitron'; color:var(--primary);">ADMIN LOGIN</h2>
            <input type="email" id="adminEmail" placeholder="Admin Email">
            <input type="password" id="adminPass" placeholder="Admin Password">
            <button class="btn-login" onclick="checkAdmin()">ENTER DASHBOARD</button>
        </div>
    </div>

    <div id="admin-dashboard">
        <div class="header">
            <h2 style="font-family:'Orbitron'; font-size: 18px;">DAKU STORE ORDERS</h2>
            <button onclick="logoutAdmin()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">LOGOUT</button>
        </div>

        <div id="orders-list">
            <p style="text-align:center; color:#555;">Bhai, orders load ho rahe hain...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // FIREBASE CONFIG (SAMA AS YOUR STORE)
        const firebaseConfig = { 
            apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", 
            authDomain: "daku-store-f2f40.firebaseapp.com", 
            projectId: "daku-store-f2f40", 
            storageBucket: "daku-store-f2f40.firebasestorage.app", 
            messagingSenderId: "556695942867", 
            appId: "1:556695942867:web:e7ca38cd63e788cee80626" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🛡️ ADMIN LOGIN SETTINGS (YAHAN CHANGE KARO)
        const MASTER_EMAIL = "priyanshdaku@gmail.com";
        const MASTER_PASS = "Daku@123";

        function checkAdmin() {
            const e = document.getElementById('adminEmail').value;
            const p = document.getElementById('adminPass').value;
            if(e === MASTER_EMAIL && p === MASTER_PASS) {
                localStorage.setItem("dakuAdmin", "true");
                showDashboard();
            } else {
                alert("Galat password hai bhai!");
            }
        }

        function showDashboard() {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            loadOrders();
        }

        function logoutAdmin() {
            localStorage.removeItem("dakuAdmin");
            location.reload();
        }

        // AUTO LOGIN CHECK
        if(localStorage.getItem("dakuAdmin") === "true") {
            showDashboard();
        }

        // LOAD ORDERS FROM FIRESTORE
        function loadOrders() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const list = document.getElementById('orders-list');
                list.innerHTML = "";
                if(snapshot.empty) { list.innerHTML = "<p style='text-align:center;'>Abhi koi order nahi aaya hai.</p>"; return; }
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const statusClass = data.status === "Pending" ? "pending" : "success";
                    
                    list.innerHTML += `
                        <div class="order-card">
                            <span class="status-badge ${statusClass}">${data.status}</span>
                            <div class="order-info">
                                <p><b>User:</b> ${data.email}</p>
                                <p><b>Plan:</b> ${data.plan}</p>
                                <p><b>UID:</b> ${data.uid}</p>
                                <p><b>GID:</b> ${data.gid || 'N/A'}</p>
                                <p><b>Server:</b> ${data.server}</p>
                                <a href="${data.screenshot}" target="_blank" class="proof-link"><i class="fas fa-image"></i> VIEW PAYMENT PROOF</a>
                            </div>
                            <div class="action-btns">
                                <button class="act-btn" style="background:#0f8;" onclick="updateStatus('${id}', 'Success')">DONE</button>
                                <button class="act-btn" style="background:#555; color:white;" onclick="updateStatus('${id}', 'Pending')">REVERT</button>
                                <button class="act-btn" style="background:red; color:white;" onclick="deleteOrder('${id}')">DELETE</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function updateStatus(id, newStatus) {
            db.collection("orders").doc(id).update({ status: newStatus })
            .then(() => alert("Status updated to " + newStatus));
        }

        function deleteOrder(id) {
            if(confirm("Bhai, kya sach mein order delete karna hai?")) {
                db.collection("orders").doc(id).delete();
            }
        }
    </script>
</body>
</html>
