<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN | DAKU STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #05070a;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white;
            overflow: hidden;
        }

        .login-card {
            background: #0f121d;
            padding: 40px 30px;
            border-radius: 30px;
            border: 2px solid #ff4b2b;
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 0 30px rgba(255, 75, 43, 0.3);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #ff4b2b;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 75, 43, 0.5);
        }

        .welcome-text {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .google-btn {
            background: white;
            color: #000;
            border: none;
            padding: 15px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .google-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">DAKU STORE</div>
        <div class="welcome-text">Login to access VIP Diamond Store</div>
        
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20">
            SIGN IN WITH GOOGLE
        </button>

        <div class="footer-text">SECURE ACCESS BY FIREBASE</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", 
            authDomain: "daku-store-f2f40.firebaseapp.com", 
            projectId: "daku-store-f2f40", 
            storageBucket: "daku-store-f2f40.firebasestorage.app", 
            messagingSenderId: "556695942867", 
            appId: "1:556695942867:web:e7ca38cd63e788cee80626" 
        };
        firebase.initializeApp(firebaseConfig);

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then(() => {
                window.location.href = 'index.html';
            }).catch(err => {
                alert("Login Failed: " + err.message);
            });
        }

        // Check if user already logged in
        firebase.auth().onAuthStateChanged(user => {
            if (user) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
