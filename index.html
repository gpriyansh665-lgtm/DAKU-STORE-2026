<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU STORE | VIP OFFICIAL</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #ff4b2b; --bg: #05070a; --card: #161a26; --accent: #0081c9; --tg: #0088cc; --wa: #25D366; --pink: #ff00ff; --gold: #ffd700; }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }

        .layout-section { min-height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background-size: cover; background-position: center; text-align: center; padding: 40px 20px; box-sizing: border-box; border-bottom: 1px solid #111; }
        #s1 { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('1000009232.png'); }
        #s2 { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('1000009226.png'); }

        .hero-title { font-family: 'Orbitron'; font-weight: 900; font-size: 3rem; color: var(--primary); margin: 0; text-shadow: 0 0 20px rgba(255,75,43,0.5); }
        .promo-box { background: rgba(22, 26, 38, 0.95); border: 2.5px solid var(--primary); border-radius: 25px; padding: 30px; width: 95%; max-width: 450px; margin-top: 30px; }

        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .srv-item { background: #0f121d; padding: 12px; border-radius: 12px; border: 1px solid #333; font-size: 11px; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 7px; width: 7px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #site-content { min-height: 100vh; background: var(--bg); }
        #security-wall { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        #main-store { display: none; padding-bottom: 120px; }

        .box { width: 85%; max-width: 380px; background: #0b0e16; padding: 35px; border-radius: 25px; border: 1px solid #222; text-align: center; }
        input { width: 100%; padding: 15px; margin: 12px 0; background: #0f121d; border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }

        header { padding: 18px 20px; background: #000; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { display: flex; overflow-x: auto; gap: 12px; padding: 15px; background: #0a0c14; scrollbar-width: none; }
        .tab-btn { padding: 12px 25px; background: #1a1e2e; border: 1px solid #333; border-radius: 15px; color: #777; white-space: nowrap; font-size: 11px; cursor: pointer; font-family: 'Orbitron'; }
        .tab-btn.active { background: var(--primary); color: white; }

        .card { background: var(--card); border-radius: 25px; padding: 25px; margin: 15px; border: 1px solid #222; position: relative; }
        .price { position: absolute; top: 25px; right: 25px; color: var(--gold); font-family: 'Orbitron'; font-weight: bold; font-size: 20px; }
        .buy-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: white; font-family: 'Orbitron'; margin-top: 15px; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 50000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); justify-content: center; align-items: center; }
        .m-cont { background: #0b0e16; width: 90%; max-width: 420px; padding: 30px; border-radius: 25px; border: 2px solid var(--primary); text-align: center; max-height: 85vh; overflow-y: auto; }
        .owl-box { background: #0f121d; border-radius: 12px; border: 1px solid #333; margin: 15px 0; text-align: left; max-height: 250px; overflow-y: auto; }
        .owl-item { display: flex; align-items: center; justify-content: space-between; padding: 14px; border-bottom: 1px solid #222; cursor: pointer; color: #ccc; font-size: 13px; }
        .owl-item.active { background: var(--primary); color: white; }

        .b-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0b0e16; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--primary); z-index: 1000; }
        .b-item { text-align: center; color: #555; font-size: 10px; cursor: pointer; text-decoration: none; }
        .b-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <section class="layout-section" id="s1">
        <h1 class="hero-title">DAKU STORE</h1>
        <p style="color:#888; letter-spacing: 2px;">VIP FF AUTOMATION SYSTEM</p>
        <div style="margin-top: 50px; font-size: 2rem; animation: bounce 2s infinite; color: var(--primary);"><i class="fas fa-chevron-down"></i></div>
    </section>

    <section class="layout-section" id="s2">
        <h2 class="hero-title" style="font-size: 1.8rem;">SYSTEM STATUS</h2>
        <div class="promo-box">
            <div style="text-align: left; margin-bottom: 10px; font-family:'Orbitron'; font-size:12px; color:var(--primary);">OWL GLOBAL SERVERS</div>
            <div class="server-grid">
                <div class="srv-item"><div><span class="status-dot"></span> IND</div><span style="color:var(--pink);">22ms</span></div>
                <div class="srv-item"><div><span class="status-dot"></span> SGP</div><span style="color:var(--pink);">18ms</span></div>
                <div class="srv-item"><div><span class="status-dot"></span> BD</div><span style="color:var(--pink);">35ms</span></div>
                <div class="srv-item"><div><span class="status-dot"></span> PAK</div><span style="color:var(--pink);">48ms</span></div>
            </div>
            <button class="btn" style="margin-top:25px;" onclick="document.getElementById('security-wall').scrollIntoView()">ENTER SYSTEM</button>
        </div>
    </section>

    <div id="site-content">
        <div id="security-wall">
            <div class="box">
                <h2 class="logo" style="margin-bottom:25px;">DAKU LOGIN</h2>
                <div id="cf-box" style="margin-bottom:20px; min-height: 65px;">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACpg8DOhPlrB0GpO" data-callback="unlockForm"></div>
                </div>
                <div id="auth-form" style="display:none;">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="password" id="pass" placeholder="Password">
                    <button class="btn" onclick="handleAuth()">LOGIN TO STORE</button>
                </div>
            </div>
        </div>

        <div id="main-store">
            <header><div class="logo">DAKU VIP STORE</div><i class="fas fa-user-circle" style="font-size:24px; cursor: pointer;" onclick="openModal('profModal')"></i></header>
            
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('likes', this)">LIKES 👍</button>
                <button class="tab-btn" onclick="switchTab('glory', this)">GLORY 🏆</button>
                <button class="tab-btn" onclick="switchTab('war', this)">WAR ⚔️</button>
                <button class="tab-btn" onclick="switchTab('diamonds', this)">DIAMONDS 💎</button>
            </div>

            <div id="likes" class="section-container" style="display:block;">
                <div class="card"><h3>Weekly Starter</h3><div class="price" id="p-weekly">...</div><button class="buy-btn" onclick="openPay('Weekly Starter', document.getElementById('p-weekly').innerText, 'player')">ORDER NOW</button></div>
                <div class="card"><h3>Pro Booster</h3><div class="price" id="p-pro">...</div><button class="buy-btn" onclick="openPay('Pro Booster', document.getElementById('p-pro').innerText, 'player')">ORDER NOW</button></div>
            </div>
            <div id="glory" class="section-container" style="display:none;"></div>
            <div id="war" class="section-container" style="display:none;"></div>
            <div id="diamonds" class="section-container" style="display:none;"></div>

            <nav class="b-nav">
                <div class="b-item active" onclick="location.reload()"><i class="fas fa-home"></i><br>HOME</div>
                <div class="b-item" onclick="openHistory()"><i class="fas fa-history"></i><br>HISTORY</div>
                <a href="https://wa.me/60126014273" class="b-item" style="color:var(--wa); text-decoration:none;"><i class="fab fa-whatsapp"></i><br>HELP</a>
            </nav>
        </div>
    </div>

    <div id="payModal" class="modal"><div class="m-cont"><h3 id="pName"></h3><p id="pPrice" style="color:var(--primary);"></p><input type="number" id="uid" placeholder="UID"><div class="owl-box" id="srvList"></div><button class="btn" onclick="submitOrder()">SUBMIT</button><p onclick="closeModal('payModal')" style="margin-top:15px;">CANCEL</p></div></div>
    <div id="profModal" class="modal"><div class="m-cont"><h3>MY ACCOUNT</h3><p id="uEm"></p><button class="btn" onclick="auth.signOut(); location.reload();" style="background:red;">LOGOUT</button><p onclick="closeModal('profModal')" style="margin-top:15px;">CLOSE</p></div></div>
    <div id="histModal" class="modal"><div class="m-cont"><h3>HISTORY</h3><div id="hItems"></div><button class="btn" onclick="closeModal('histModal')" style="margin-top:15px;">CLOSE</button></div></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const fbConf = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", authDomain: "daku-store-f2f40.firebaseapp.com", projectId: "daku-store-f2f40", storageBucket: "daku-store-f2f40.firebasestorage.app", messagingSenderId: "556695942867", appId: "1:556695942867:web:e7ca38cd63e788cee80626" };
        firebase.initializeApp(fbConf);
        const auth = firebase.auth(), db = firebase.firestore();

        // 🔥 CLOUDFLARE BYPASS JUGAAD
        window.unlockForm = () => {
            document.getElementById('cf-box').style.display = 'none';
            document.getElementById('auth-form').style.display = 'block';
        };

        // Agar Cloudflare nahi load hua toh 4 second baad auto-show
        setTimeout(() => {
            if (document.getElementById('auth-form').style.display !== 'block') {
                unlockForm();
            }
        }, 4000);

        window.handleAuth = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Details bharo!");
            auth.signInWithEmailAndPassword(e,p).catch(() => auth.createUserWithEmailAndPassword(e,p));
        };

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('security-wall').style.display = 'none';
                document.getElementById('main-store').style.display = 'block';
                document.getElementById('uEm').innerText = user.email;
                startPriceSync();
            } else { document.getElementById('security-wall').style.display = 'flex'; }
        });

        function startPriceSync() {
            db.collection("products").doc("likes").onSnapshot(d => { if(d.exists) { 
                const v = d.data(); 
                document.getElementById('p-weekly').innerText="₹"+v.weekly; 
                document.getElementById('p-pro').innerText="₹"+v.pro; 
            }});
        }

        window.switchTab = (id, b) => {
            document.querySelectorAll('.section-container').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id).style.display = 'block'; b.classList.add('active');
        };

        window.openPay = (n, p) => { document.getElementById('pName').innerText = n; document.getElementById('pPrice').innerText = p; document.getElementById('payModal').style.display = 'flex'; };
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        
        window.openHistory = async () => {
            document.getElementById('histModal').style.display = 'flex';
            const h = document.getElementById('hItems'); h.innerHTML = "Loading...";
            const snap = await db.collection("orders").where("email", "==", auth.currentUser.email).get();
            if(snap.empty) return h.innerHTML = "No orders.";
            h.innerHTML = "";
            snap.forEach(doc => { const d = doc.data(); h.innerHTML += `<div style="background:#111; padding:10px; margin-bottom:5px; border-radius:5px; text-align:left;"><b>${d.plan}</b> - <span style="color:yellow">${d.status}</span></div>`; });
        };
    </script>
</body>
</html>
