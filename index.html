<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU STORE | VIP GLOBAL STORE</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        :root { --primary: #ff4b2b; --secondary: #ff416c; --bg: #05070a; --card: #0f121d; --accent: #00ffcc; --pink: #ff00ff; --binance: #f3ba2f; }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* 🔐 LOGIN SECTION */
        #auth-view { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1a0505 0%, #05070a 100%); }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #333; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 30px rgba(255, 75, 43, 0.2); }
        .auth-logo { font-family: 'Orbitron'; font-size: 24px; color: var(--primary); margin-bottom: 25px; text-shadow: 0 0 15px var(--primary); }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; background: #05070a; border: 1px solid #333; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Orbitron'; }
        .toggle-auth { margin-top: 15px; font-size: 13px; color: #888; cursor: pointer; }
        .toggle-auth span { color: var(--primary); font-weight: bold; }

        /* 🛠️ MAINTENANCE & LOADER */
        #maintenance-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.5s ease; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 75, 43, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* HEADER */
        header { padding: 15px 20px; background: linear-gradient(to right, #000, #111); border-bottom: 3px solid var(--primary); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 20px; color: var(--primary); }
        
        /* TABS & CARDS */
        .nav-tabs { display: flex; overflow-x: auto; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05); scrollbar-width: none; }
        .tab-btn { padding: 10px 20px; background: #1a1e2e; border: 1px solid #333; border-radius: 50px; color: #888; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 11px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; margin: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .amt { font-size: 18px; font-weight: 900; font-family: 'Orbitron'; }

        /* 📜 ORDER HISTORY */
        #orders-view { display: none; padding: 15px; }
        .history-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-right: 4px solid var(--primary); }
        .status-pill { padding: 4px 10px; border-radius: 50px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #ffd700; color: #000; }
        .status-success { background: #00ffcc; color: #000; }

        /* MODALS & OWL SERVERS */
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        .modal-content { background: #0b0e16; width: 90%; max-width: 400px; padding: 25px; border-radius: 30px; border: 2px solid var(--primary); text-align: center; max-height: 85vh; overflow-y: auto; }
        
        .owl-box { background: #0d1117; border-radius: 15px; border: 1px solid #333; margin: 10px 0; max-height: 200px; overflow-y: auto; text-align: left; }
        .owl-item { padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .owl-item.active { background: var(--primary); color: white; }
        .status-dot { height: 7px; width: 7px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* 📱 BOTTOM NAV */
        .b-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0b0e16; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--primary); z-index: 10000; }
        .b-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; font-weight: bold; flex: 1; cursor: pointer; }
        .b-item.active { color: var(--primary); }
        .b-item i { font-size: 20px; display: block; margin-bottom: 3px; }

        .btn-buy { background: #0088cc; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body onload="init()">

    <div id="loader"><div class="spinner"></div><div style="margin-top:15px; font-family:'Orbitron'; color:var(--primary);">DAKU STORE</div></div>

    <div id="auth-view">
        <div class="auth-card">
            <div class="auth-logo" id="auth-title">LOGIN</div>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">CONTINUE</button>
            <div class="toggle-auth" onclick="toggleAuth()">Don't have an account? <span id="toggle-span">SIGNUP</span></div>
        </div>
    </div>

    <div id="main-store-view" style="display: none;">
        <div id="maintenance-screen">
            <i class="fas fa-tools" style="font-size:70px; color:var(--primary); margin-bottom:20px;"></i>
            <h1>STORE UPDATING</h1>
            <button onclick="location.reload()" class="btn-buy">REFRESH</button>
        </div>

        <header><div class="logo">DAKU STORE</div><i class="fas fa-sign-out-alt" onclick="auth.signOut()"></i></header>

        <div id="home-view">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('topup', this)">DIAMONDS 💎</button>
                <button class="tab-btn" onclick="switchTab('likes', this)">LIKES 👍</button>
                <button class="tab-btn" onclick="switchTab('glory', this)">GLORY 🏆</button>
            </div>
            <div id="topup" class="section-container active">
                <div class="card"><div><h3>100 Diamonds</h3><p>Instant Topup</p></div><div><span class="amt">₹80</span><br><button class="btn-buy" onclick="openPay('100💎','₹80','p')">BUY</button></div></div>
            </div>
            <div id="likes" class="section-container" style="display:none;">
                <div class="card"><div><h3>1540 Likes</h3><p>Fast Service</p></div><div><span class="amt">₹100</span><br><button class="btn-buy" onclick="openPay('1540 Likes','₹100','p')">BUY</button></div></div>
            </div>
            <div id="glory" class="section-container" style="display:none;">
                <div class="card"><div><h3>Full Match</h3><p>Full Guild Glory</p></div><div><span class="amt">₹1500</span><br><button class="btn-buy" onclick="openPay('Full Match','₹1500','g')">ORDER</button></div></div>
            </div>
        </div>

        <div id="orders-view">
            <h2 style="font-family:'Orbitron'; text-align:center; color:var(--primary);">MY HISTORY</h2>
            <div id="history-list"></div>
        </div>

        <nav class="b-nav">
            <div class="b-item active" id="home-icon" onclick="showView('home')"><i class="fas fa-home"></i>HOME</div>
            <div class="b-item" id="order-icon" onclick="showView('orders')"><i class="fas fa-shopping-bag"></i>MY ORDERS</div>
            <div class="b-item" onclick="window.open('https://wa.me/60126014273')"><i class="fab fa-whatsapp"></i>SUPPORT</div>
        </nav>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content" id="detail-cont"></div></div>

    <div id="mModal" class="modal">
        <div class="modal-content">
            <h2 id="mName"></h2><p id="mPrice" style="color:var(--accent); font-weight:bold;"></p>
            <input type="number" id="uid" placeholder="Enter Player UID">
            <p style="text-align:left; font-size:11px; color:#666; margin-top:10px;">SELECT OWL SERVER:</p>
            <div class="owl-box" id="ol"></div>
            <div style="display:flex; gap:10px; margin:10px 0;"><button onclick="setM('UPI')" style="flex:1; padding:10px; background:#222; color:white; border:none; border-radius:8px;">UPI</button><button onclick="setM('Binance')" style="flex:1; padding:10px; background:#222; color:white; border:none; border-radius:8px;">BINANCE</button></div>
            <div id="u_info" style="display:none; padding:10px; background:white; border-radius:10px; margin-bottom:10px;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=upi://pay?pa=priyanshdaku@gmail.com" width="100"></div>
            <input type="file" id="file" accept="image/*">
            <button class="btn-buy" id="subBtn" onclick="submitOrder()" style="width:100%; padding:15px; margin-top:10px;">SUBMIT ORDER</button>
            <p onclick="document.getElementById('mModal').style.display='none'" style="font-size:12px; color:#555; cursor:pointer; margin-top:10px;">CANCEL</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", projectId: "daku-store-f2f40" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let uE="", srv="", method="", isLogin = true;

        const servers = [
            { n: "India 🇮🇳", p: "20ms" }, { n: "Bangladesh 🇧🇩", p: "32ms" }, { n: "Pakistan 🇵🇰", p: "45ms" },
            { n: "Nepal 🇳🇵", p: "28ms" }, { n: "Singapore 🇸🇬", p: "15ms" }, { n: "Brazil 🇧🇷", p: "160ms" },
            { n: "Indonesia 🇮🇩", p: "50ms" }, { n: "Mina 🏜️", p: "55ms" }, { n: "Europe 🇪🇺", p: "85ms" },
            { n: "Thailand 🇹🇭", p: "38ms" }, { n: "Vietnam 🇻🇳", p: "40ms" }, { n: "Taiwan 🇹🇼", p: "62ms" }
        ];

        function init() {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
            auth.onAuthStateChanged(user => {
                if(user) {
                    uE = user.email;
                    document.getElementById('auth-view').style.display = 'none';
                    document.getElementById('main-store-view').style.display = 'block';
                    loadOrders();
                    db.collection("settings").doc("maintenance").onSnapshot(doc => {
                        document.getElementById('maintenance-screen').style.display = doc.data()?.status ? 'flex' : 'none';
                    });
                } else {
                    document.getElementById('auth-view').style.display = 'flex';
                    document.getElementById('main-store-view').style.display = 'none';
                }
            });
        }

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "LOGIN" : "SIGNUP";
            document.getElementById('toggle-span').innerText = isLogin ? "SIGNUP" : "LOGIN";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Bhai, Details dalo!");
            try {
                if(isLogin) await auth.signInWithEmailAndPassword(email, pass);
                else { await auth.createUserWithEmailAndPassword(email, pass); alert("Account Created!"); }
            } catch(e) { alert(e.message); }
        }

        function showView(v) {
            document.getElementById('home-view').style.display = v==='home' ? 'block' : 'none';
            document.getElementById('orders-view').style.display = v==='orders' ? 'block' : 'none';
            document.getElementById('home-icon').classList.toggle('active', v==='home');
            document.getElementById('order-icon').classList.toggle('active', v==='orders');
        }

        function openPay(n, p) {
            document.getElementById('mName').innerText = n;
            document.getElementById('mPrice').innerText = p;
            document.getElementById('mModal').style.display = 'flex';
            const box = document.getElementById('ol'); box.innerHTML = "";
            servers.forEach(s => {
                const d = document.createElement('div'); d.className = "owl-item";
                d.innerHTML = `<span><span class="status-dot"></span>${s.n}</span><small style="color:var(--pink); font-weight:bold;">${s.p}</small>`;
                d.onclick = () => { srv = s.n; document.querySelectorAll('.owl-item').forEach(i=>i.classList.remove('active')); d.classList.add('active'); };
                box.appendChild(d);
            });
        }

        function setM(m) { method = m; document.getElementById('u_info').style.display = m==='UPI'?'block':'none'; }

        async function submitOrder() {
            const uid = document.getElementById('uid').value, file = document.getElementById('file').files[0], btn = document.getElementById('subBtn');
            if(!uid || !srv || !method || !file) return alert("Details missing!");
            btn.disabled = true; btn.innerText = "UPLOADING...";
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch('https://api.imgbb.com/1/upload?key=78923d40e6ec332df5f35ccc57f05aa6', { method: 'POST', body: fd });
            const data = await res.json();
            if(data.success) {
                const url = data.data.url;
                await db.collection("orders").add({ email: uE, uid: uid, plan: document.getElementById('mName').innerText, server: srv, screenshot: url, status: "Pending", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                fetch(`https://api.telegram.org/bot8677747394:AAEO10zDYYEA_jwC9HH7VoDOCOc7_4eSZDY/sendMessage?chat_id=6829395007&parse_mode=Markdown&text=🚨 *NEW ORDER* %0A👤 User: ${uE} %0A🆔 UID: ${uid} %0A🌍 Server: ${srv} %0A📸 [PROOF](${url})`);
                alert("Order Placed!"); document.getElementById('mModal').style.display='none';
            }
        }

        function loadOrders() {
            db.collection("orders").where("email", "==", uE).orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('history-list'); list.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    const sCls = o.status === "Pending" ? "status-pending" : "status-success";
                    list.innerHTML += `<div class="history-card" onclick="viewOrder('${doc.id}')"><div><b>${o.plan}</b><br><small>UID: ${o.uid}</small></div><span class="status-pill ${sCls}">${o.status}</span></div>`;
                });
            });
        }

        async function viewOrder(id) {
            const doc = await db.collection("orders").doc(id).get();
            const o = doc.data();
            document.getElementById('detail-cont').innerHTML = `
                <h3 style="color:var(--primary); font-family:'Orbitron';">ORDER DETAILS</h3>
                <div style="text-align:left; font-size:13px; line-height:1.8;">
                    <b>PLAN:</b> ${o.plan}<br><b>UID:</b> ${o.uid}<br><b>SERVER:</b> ${o.server}<br>
                    <b>STATUS:</b> <span style="color:var(--accent)">${o.status}</span><br>
                    <b>TIME:</b> ${o.timestamp.toDate().toLocaleString()}<br>
                </div>
                <a href="${o.screenshot}" target="_blank" style="color:var(--pink); display:block; margin-top:10px;">Payment Proof</a>
                <button class="btn-buy" style="margin-top:15px; width:100%;" onclick="document.getElementById('detailModal').style.display='none'">CLOSE</button>`;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function switchTab(id, b) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active')); b.classList.add('active');
            document.querySelectorAll('.section-container').forEach(s => s.style.display='none');
            document.getElementById(id).style.display='block';
        }
    </script>
</body>
</html>
